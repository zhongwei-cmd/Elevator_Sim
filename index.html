<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复古梦幻 | 电梯全天候双向承压仿真引擎 (Phase 3 修复版)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="tailwind.js"></script>
    <script src="chart.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"DM Serif Display"', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        base: '#FCF8EC', 
                        textMain: '#374151', 
                        glassBorder: 'rgba(255, 255, 255, 0.5)',
                    }
                }
            }
        }
    </script>

    <style>
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(40px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 15s infinite alternate ease-in-out; }
        .animation-delay-2000 { animation-delay: 2s; }

        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.3));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glassBorder);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%;
            background: #D8B4E2; cursor: pointer; margin-top: -7px; border: 2px solid white;
            box-shadow: 0 3px 8px rgba(216, 180, 226, 0.5); transition: transform 0.3s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 5px; cursor: pointer; background: rgba(255, 255, 255, 0.6); border-radius: 999px;
        }
        
        select {
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
</head>
<body class="font-sans text-textMain bg-base min-h-screen relative overflow-x-hidden">

    <div class="fixed inset-0 w-full h-full z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob animation-delay-2000"></div>
    </div>

    <main class="relative z-10 container mx-auto px-6 py-8 flex flex-col items-center">
        
        <header class="text-center mb-6">
            <h1 class="font-serif text-4xl tracking-wide text-slate-800 mb-2">Full-Day <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-indigo-500">Traffic Simulation</span></h1>
            <p class="text-gray-500 tracking-widest text-xs uppercase font-semibold">Phase 3: 引入全天候场景切换与双向排队承压模型 (控件修复版)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 w-full max-w-7xl">
            
            <div class="col-span-1 lg:col-span-4 space-y-4">
                
                <div class="glass-card rounded-[2rem] p-5 flex flex-col gap-3 shadow-sm border-l-4 border-l-pink-400">
                    <div class="flex flex-col gap-2">
                        <label for="inp-scenario" class="text-xs font-bold text-slate-700 uppercase tracking-wide">时段与客流模式设定 (Traffic Profile)</label>
                        <select id="inp-scenario" onchange="updateScenario(); runSimulation();" class="w-full bg-white/70 border border-slate-200 rounded-lg px-3 py-2 text-slate-800 font-bold focus:outline-none focus:ring-2 focus:ring-pink-300 transition-all shadow-sm text-sm cursor-pointer">
                            <option value="morning">🌅 早高峰 (Up-Peak) - 大量上行</option>
                            <option value="lunch">🍱 午间高峰 (Lunch-Peak) - 极致双向承压</option>
                            <option value="evening">🌇 晚高峰 (Down-Peak) - 大量下行</option>
                            <option value="custom">⚙️ 自定义流量分布 (Custom)</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-3 gap-2 mt-1">
                        <div class="flex flex-col">
                            <label class="text-[10px] text-gray-500 font-bold">上行 %</label>
                            <input type="number" id="rate-up" value="85" class="bg-white/50 border border-gray-200 rounded px-2 py-1 text-sm font-bold text-purple-600 text-center">
                        </div>
                        <div class="flex flex-col">
                            <label class="text-[10px] text-gray-500 font-bold">下行 %</label>
                            <input type="number" id="rate-down" value="10" class="bg-white/50 border border-gray-200 rounded px-2 py-1 text-sm font-bold text-blue-600 text-center">
                        </div>
                        <div class="flex flex-col">
                            <label class="text-[10px] text-gray-500 font-bold">层间 %</label>
                            <input type="number" id="rate-inter" value="5" class="bg-white/50 border border-gray-200 rounded px-2 py-1 text-sm font-bold text-gray-600 text-center">
                        </div>
                    </div>
                    
                    <div class="flex flex-col gap-1 mt-1">
                        <div class="flex justify-between text-[11px] font-bold text-gray-500 uppercase"><span>高峰持续时长 (分钟)</span> <span id="val-dur" class="text-pink-600">60 mins</span></div>
                        <input type="range" id="inp-dur" min="15" max="120" step="15" value="60" oninput="document.getElementById('val-dur').innerText = this.value + ' mins'" onchange="runSimulation()">
                    </div>
                </div>

                <div class="glass-card rounded-[2rem] p-5 flex flex-col gap-3 shadow-sm">
                    <div class="flex flex-col gap-2 p-3 bg-indigo-50/60 border border-indigo-100 rounded-xl mb-1">
                        <label for="inp-algo" class="text-[11px] font-bold text-indigo-700 uppercase tracking-wide">派梯算法 (Dispatch Algorithm)</label>
                        <select id="inp-algo" class="w-full bg-white/70 border border-indigo-200 rounded-md px-2 py-1 text-slate-800 font-bold focus:outline-none focus:ring-2 focus:ring-indigo-400 text-xs cursor-pointer">
                            <option value="collective">传统集选控制 (Collective)</option>
                            <option value="eta" selected>ETA 智能群控 (ETA)</option>
                            <option value="dcs">目的层控制系统 (DCS / DOAS)</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-gray-500 uppercase">总人数 (P)</label>
                            <input type="number" id="inp-p" value="4210" class="w-full bg-white/40 border border-white/60 rounded px-3 py-1.5 text-slate-800 font-semibold text-sm">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-bold text-gray-500 uppercase">提升高度 (H)</label>
                            <input type="number" id="inp-h" value="61.1" step="0.1" class="w-full bg-white/40 border border-white/60 rounded px-3 py-1.5 text-slate-800 font-semibold text-sm">
                        </div>
                    </div>

                    <div class="space-y-2 mt-1">
                        <div class="flex flex-col gap-1">
                            <div class="flex justify-between text-[11px] font-bold text-gray-500 uppercase"><span>出勤率 (A)</span> <span id="val-a" class="text-emerald-600">80 %</span></div>
                            <input type="range" id="inp-a" min="50" max="100" step="5" value="80">
                        </div>
                        <div class="flex flex-col gap-1">
                            <div class="flex justify-between text-[11px] font-bold text-gray-500 uppercase"><span>5分钟到达率 (R)</span> <span id="val-r" class="text-orange-600">12 %</span></div>
                            <input type="range" id="inp-r" min="5" max="25" step="1" value="12">
                        </div>
                        <div class="flex flex-col gap-1">
                            <div class="flex justify-between text-[11px] font-bold text-gray-500 uppercase"><span>服务楼层 (F)</span> <span id="val-f" class="text-blue-600">13 层</span></div>
                            <input type="range" id="inp-f" min="2" max="50" step="1" value="13">
                        </div>
                        
                        <div class="flex flex-col gap-1">
                            <div class="flex justify-between text-[11px] font-bold text-gray-500 uppercase"><span>梯数(Q) / 速度(V)</span> <span id="val-qv" class="text-purple-600">8部 | 2.5m/s</span></div>
                            <div class="flex gap-2">
                                <input type="range" id="inp-q" min="1" max="20" step="1" value="8" class="w-1/2">
                                <input type="range" id="inp-v" min="1.0" max="8.0" step="0.5" value="2.5" class="w-1/2">
                            </div>
                        </div>
                        
                        <div class="flex flex-col gap-1 mt-2 p-2 bg-purple-50/50 rounded-lg border border-purple-100">
                            <div class="flex justify-between text-[11px] font-bold text-purple-700 uppercase"><span>核定载重 (W)</span> <span id="val-w" class="text-purple-700 font-bold">1600 kg</span></div>
                            <input type="range" id="inp-w" min="800" max="2000" step="50" value="1600">
                        </div>
                    </div>

                    <button onclick="runSimulation()" class="mt-2 w-full py-3 rounded-xl bg-slate-800 text-white font-semibold hover:bg-slate-700 active:scale-95 transition-all shadow-lg text-sm tracking-widest">
                        执行动态仿真 (RUN)
                    </button>
                </div>
            </div>

            <div class="col-span-1 lg:col-span-8 flex flex-col gap-4">
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div class="glass-card rounded-2xl p-4 text-center transition-all duration-300" id="card-awt-up">
                        <p class="text-[10px] font-bold text-gray-500 uppercase mb-1">上行排队等候 (Lobby)</p>
                        <p class="font-serif text-3xl text-purple-700"><span id="res-awt-up">0</span><span class="text-xs font-sans ml-1 text-gray-400">s</span></p>
                    </div>
                    <div class="glass-card rounded-2xl p-4 text-center transition-all duration-300" id="card-awt-down">
                        <p class="text-[10px] font-bold text-gray-500 uppercase mb-1">下行排队等候 (Floors)</p>
                        <p class="font-serif text-3xl text-blue-600"><span id="res-awt-down">0</span><span class="text-xs font-sans ml-1 text-gray-400">s</span></p>
                    </div>
                    <div class="glass-card rounded-2xl p-4 text-center">
                        <p class="text-[10px] font-bold text-gray-500 uppercase mb-1">综合平均乘坐 (ATT)</p>
                        <p class="font-serif text-3xl text-slate-800"><span id="res-att">0</span><span class="text-xs font-sans ml-1 text-gray-400">s</span></p>
                    </div>
                    <div class="glass-card rounded-2xl p-4 text-center bg-white/50 border-indigo-100 shadow-inner">
                        <p class="text-[10px] font-bold text-gray-500 uppercase mb-1">综合到站时间 (ATTD)</p>
                        <p class="font-serif text-3xl text-indigo-600"><span id="res-attd">0</span><span class="text-xs font-sans ml-1 text-gray-400">s</span></p>
                    </div>
                </div>

                <div class="glass-card rounded-[2rem] p-5 flex-grow relative min-h-[380px]">
                    <canvas id="mcChart"></canvas>
                </div>

                <div class="glass-card rounded-2xl p-4 text-xs text-gray-600 leading-relaxed flex flex-col gap-2">
                    <div class="flex items-center gap-2">
                        <span class="px-2 py-1 bg-slate-200 rounded text-[10px] font-bold uppercase tracking-wide">物理引擎日志</span>
                        <span id="log-info" class="font-medium">等待运行...</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="px-2 py-1 bg-indigo-100 text-indigo-700 rounded text-[10px] font-bold uppercase tracking-wide">算法状态反馈</span>
                        <span id="gc-info" class="text-indigo-700 font-medium">请点击运行以应用模型。</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 场景预设数据
        const profiles = {
            'morning': { up: 85, down: 10, inter: 5 },
            'lunch': { up: 40, down: 40, inter: 20 },
            'evening': { up: 10, down: 85, inter: 5 }
        };

        function updateScenario() {
            const sc = document.getElementById('inp-scenario').value;
            if(sc !== 'custom') {
                document.getElementById('rate-up').value = profiles[sc].up;
                document.getElementById('rate-down').value = profiles[sc].down;
                document.getElementById('rate-inter').value = profiles[sc].inter;
            }
        }

        // 修改输入比例时自动设为自定义，并重新跑仿真
        document.querySelectorAll('#rate-up, #rate-down, #rate-inter').forEach(el => {
            el.addEventListener('change', () => {
                document.getElementById('inp-scenario').value = 'custom';
                runSimulation();
            });
        });

        const ctx = document.getElementById('mcChart').getContext('2d');
        let simChart = new Chart(ctx, {
            type: 'scatter',
            data: { 
                datasets: [
                    { label: '大厅上行排队 (Up-Queue)', data: [], backgroundColor: 'rgba(168, 85, 247, 0.5)', pointRadius: 2.5, pointHoverRadius: 6 },
                    { label: '楼层下行排队 (Down-Queue)', data: [], backgroundColor: 'rgba(59, 130, 246, 0.5)', pointRadius: 2.5, pointHoverRadius: 6 }
                ] 
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { 
                    legend: { display: true, position: 'top', labels: { font: { size: 11, family: 'Inter' } } },
                    tooltip: { mode: 'nearest', intersect: false }
                },
                scales: {
                    x: { title: { display: true, text: '仿真时间轴 (分钟)', font: { size: 11 } }, min: 0 },
                    y: { title: { display: true, text: '排队等候时长 (s)', font: { size: 11 } }, beginAtZero: true }
                }
            }
        });

        function debounce(func, wait) {
            let timeout;
            return function() { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, arguments), wait); };
        }

        const runSimulation = debounce(function() {
            const algo = document.getElementById('inp-algo').value;
            const P = parseInt(document.getElementById('inp-p').value) || 0;
            const H = parseFloat(document.getElementById('inp-h').value) || 0;
            const A = parseFloat(document.getElementById('inp-a').value);
            const R = parseFloat(document.getElementById('inp-r').value);
            const F = parseInt(document.getElementById('inp-f').value);
            const Q = parseInt(document.getElementById('inp-q').value);
            const V = parseFloat(document.getElementById('inp-v').value);
            const W = parseInt(document.getElementById('inp-w').value); 
            const durationMins = parseInt(document.getElementById('inp-dur').value);

            let upRate = parseFloat(document.getElementById('rate-up').value) || 0;
            let downRate = parseFloat(document.getElementById('rate-down').value) || 0;
            let interRate = parseFloat(document.getElementById('rate-inter').value) || 0;
            
            let totalRate = upRate + downRate + interRate;
            if(totalRate === 0) { upRate = 100; totalRate = 100; }
            upRate /= totalRate; downRate /= totalRate; interRate /= totalRate;

            if (P <= 0 || H <= 0) return;

            let stopReductionUp = 1.0;
            let stopReductionDown = 1.0;
            let transferTime = 1.5;     
            let effCapRatio = 0.8;      
            let algoDesc = "";

            if (algo === 'collective') {
                algoDesc = "集选控制：电梯在午间双向承压下容易发生严重的“扎堆截胡”，效率最低。";
            } else if (algo === 'eta') {
                stopReductionUp = Math.max(0.65, 1 - 0.04 * (Q - 1));
                stopReductionDown = Math.max(0.70, 1 - 0.03 * (Q - 1)); 
                algoDesc = "ETA 群控：系统智能分配上/下行响应，有效缓解午餐期间的电梯扎堆现象。";
            } else if (algo === 'dcs') {
                if(upRate > 0.6) {
                    stopReductionUp = Math.max(0.35, 1 - 0.08 * (Q - 1));
                    stopReductionDown = 0.8;
                    algoDesc = "DCS 目的层：探测到【早高峰特征】，大厅人员被完美分组打包，停站数断崖式下降！";
                } else if(downRate > 0.6) {
                    stopReductionUp = 0.8;
                    stopReductionDown = Math.max(0.60, 1 - 0.05 * (Q - 1));
                    algoDesc = "DCS 目的层：探测到【晚高峰特征】，高层下行人员得到一定程度的分组优化。";
                } else {
                    stopReductionUp = Math.max(0.55, 1 - 0.06 * (Q - 1));
                    stopReductionDown = Math.max(0.65, 1 - 0.04 * (Q - 1));
                    algoDesc = "DCS 目的层：探测到【午间混合交通】，系统努力平衡双向重载，进出效率提升至 1.0s/人。";
                }
                transferTime = 1.0; 
                effCapRatio = 0.90;  
            }

            const maxCapacity = Math.floor(W / 75); 
            const effectiveCapacity = Math.floor(maxCapacity * effCapRatio);
            const durationSecs = durationMins * 60;

            const N_total_peak = Math.floor(P * (A / 100) * (durationMins / 60)); 
            const N_up = Math.floor(N_total_peak * upRate); 
            const N_down = Math.floor(N_total_peak * downRate); 
            
            let arrivalsUp = [], arrivalsDown = [];
            let stdDev = (durationSecs / 2) / (R / 100 * Math.sqrt(2 * Math.PI)); 
            
            function generateArrivals(count, arr) {
                for(let i=0; i<count; i++) {
                    let u=0, v=0; while(u===0) u=Math.random(); while(v===0) v=Math.random();
                    let z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
                    let t = (durationSecs / 2) + z * stdDev; 
                    if(t < 0) t = Math.random() * (durationSecs * 0.2);
                    if(t > durationSecs) t = durationSecs * 0.8 + Math.random() * (durationSecs * 0.2);
                    arr.push(t);
                }
                arr.sort((a,b) => a - b);
            }
            generateArrivals(N_up, arrivalsUp);
            generateArrivals(N_down, arrivalsDown);

            function getProbableStops(n, floors) { return n === 0 ? 0 : floors * (1 - Math.pow((1 - 1/floors), n)); }
            function getHighestReversalFloor(n, floors) {
                if(n === 0) return 0;
                let sum = 0; for(let i=1; i<floors; i++) sum += Math.pow(i/floors, n);
                return floors - sum;
            }

            let elevators = Array(Q).fill(0); 
            let waitTimesUp = [], waitTimesDown = [];
            let chartDataUp = [], chartDataDown = [];
            let queueUp = [...arrivalsUp], queueDown = [...arrivalsDown];
            let maxQueueUp = 0, maxQueueDown = 0;

            while(queueUp.length > 0 || queueDown.length > 0) {
                elevators.sort((a,b) => a - b);
                let t_avail = elevators[0];
                
                let t_first_up = queueUp.length > 0 ? queueUp[0] : Infinity;
                let t_first_down = queueDown.length > 0 ? queueDown[0] : Infinity;
                let t_first = Math.min(t_first_up, t_first_down);
                
                let doorReaction = algo === 'dcs' ? 2 : 3.5; 
                let t_start = Math.max(t_avail, t_first) + doorReaction; 

                let boardedUp = 0;
                let tempUp = [];
                maxQueueUp = Math.max(maxQueueUp, queueUp.length);

                for(let i=0; i<queueUp.length; i++) {
                    if (queueUp[i] <= t_start + 10 && boardedUp < effectiveCapacity) {
                        waitTimesUp.push(Math.max(0, (t_start + 10) - queueUp[i]));
                        if (Math.random() < 0.2) chartDataUp.push({ x: queueUp[i]/60, y: waitTimesUp[waitTimesUp.length-1] });
                        boardedUp++;
                    } else tempUp.push(queueUp[i]); 
                }
                queueUp = tempUp;

                let est_stops_up = getProbableStops(boardedUp, F) * stopReductionUp;
                let est_hrf_up = getHighestReversalFloor(boardedUp, F);
                let t_half = ((est_hrf_up / Math.max(1, F)) * H) / V + est_stops_up * 9.5 + boardedUp * transferTime;
                
                let boardedDown = 0;
                let tempDown = [];
                maxQueueDown = Math.max(maxQueueDown, queueDown.length);

                for(let i=0; i<queueDown.length; i++) {
                    if (queueDown[i] <= t_start + t_half + 10 && boardedDown < effectiveCapacity) {
                        waitTimesDown.push(Math.max(0, (t_start + t_half + 10) - queueDown[i]));
                        if (Math.random() < 0.2) chartDataDown.push({ x: queueDown[i]/60, y: waitTimesDown[waitTimesDown.length-1] });
                        boardedDown++;
                    } else tempDown.push(queueDown[i]);
                }
                queueDown = tempDown;

                let stops_up = getProbableStops(boardedUp, F) * stopReductionUp;
                let stops_down = getProbableStops(boardedDown, F) * stopReductionDown;
                let hrf = Math.max(getHighestReversalFloor(boardedUp, F), getHighestReversalFloor(boardedDown, F));
                if (hrf === 0) hrf = 1; 
                let dist = (hrf / Math.max(1, F)) * H; 

                let interMultiplier = 1 + interRate;
                const rtt = ((2 * dist) / V + (stops_up + stops_down) * 9.5 + (boardedUp + boardedDown) * transferTime) * interMultiplier;
                
                elevators[0] = t_start + rtt; 
            }

            const awtUp = waitTimesUp.length > 0 ? (waitTimesUp.reduce((a,b)=>a+b,0)/N_up) : 0;
            const awtDown = waitTimesDown.length > 0 ? (waitTimesDown.reduce((a,b)=>a+b,0)/N_down) : 0;
            const overallAwt = (waitTimesUp.reduce((a,b)=>a+b,0) + waitTimesDown.reduce((a,b)=>a+b,0)) / (N_up + N_down) || 0;
            
            const avgBoarding = (effectiveCapacity * (upRate + downRate)) / 2;
            const att = (((getHighestReversalFloor(avgBoarding, F)/2)/F)*H)/V + ((getProbableStops(avgBoarding, F)*stopReductionUp)/2)*9.5;
            
            animateValue("res-awt-up", awtUp);
            animateValue("res-awt-down", awtDown);
            animateValue("res-att", att);
            animateValue("res-attd", overallAwt + att);

            let cardUp = document.getElementById('card-awt-up');
            cardUp.className = `glass-card rounded-2xl p-4 text-center transition-all duration-300 ${awtUp > 100 ? 'bg-red-100/80 shadow-red-200' : awtUp > 45 ? 'bg-yellow-100/80' : 'bg-white/50'}`;
            let cardDown = document.getElementById('card-awt-down');
            cardDown.className = `glass-card rounded-2xl p-4 text-center transition-all duration-300 ${awtDown > 100 ? 'bg-red-100/80 shadow-red-200' : awtDown > 45 ? 'bg-yellow-100/80' : 'bg-white/50'}`;

            simChart.options.scales.x.max = durationMins;
            simChart.data.datasets[0].data = chartDataUp;
            simChart.data.datasets[1].data = chartDataDown;
            
            document.getElementById("log-info").innerHTML = `仿真完毕：共生成上行需求 <b>${N_up}</b> 人，下行 <b>${N_down}</b> 人。上行最大积压 <b class="text-purple-600">${maxQueueUp}</b> 人，下行最大积压 <b class="text-blue-600">${maxQueueDown}</b> 人。`;
            document.getElementById("gc-info").innerHTML = algoDesc;
            
            simChart.update();
        }, 300);

        function animateValue(id, end) {
            let obj = document.getElementById(id);
            let start = parseFloat(obj.innerText) || 0;
            let duration = 600; let startTime = null;
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                let progress = Math.min((timestamp - startTime) / duration, 1);
                obj.innerText = (progress * (end - start) + start).toFixed(1);
                if (progress < 1) window.requestAnimationFrame(step);
            }
            window.requestAnimationFrame(step);
        }

        // ==========================================
        // 修复：监听输入，联动文字标签并触发重新仿真
        // ==========================================
        ['inp-a','inp-r','inp-f','inp-q','inp-v','inp-w'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                // 1. 更新对应显示的文字标签
                if (id === 'inp-q' || id === 'inp-v') {
                    const qVal = document.getElementById('inp-q').value;
                    const vVal = parseFloat(document.getElementById('inp-v').value).toFixed(1);
                    document.getElementById('val-qv').innerText = `${qVal}部 | ${vVal}m/s`;
                } else {
                    const val = document.getElementById(id).value;
                    const tagId = 'val-' + id.split('-')[1];
                    if (id === 'inp-w') document.getElementById(tagId).innerText = val + ' kg';
                    else document.getElementById(tagId).innerText = val + (id === 'inp-f' ? ' 层' : ' %');
                }
            });
            // 2. 松开滑块/发生改变时触发仿真
            document.getElementById(id).addEventListener('change', runSimulation);
        });

        // 监听直接输入框的失焦或回车改变
        ['inp-p','inp-h'].forEach(id => document.getElementById(id).addEventListener('change', runSimulation));
        document.getElementById('inp-algo').addEventListener('change', runSimulation);

        // 初始化加载
        setTimeout(() => { updateScenario(); runSimulation(); }, 500);
    </script>
</body>
